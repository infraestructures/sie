  <script>
    // Prototip: simula desplegable municipi per illa
    function onIllaChange() {
      const illa = document.getElementById('illa').value;
      const municipi = document.getElementById('municipi');

      municipi.innerHTML = '<option value="">Selecciona un municipi</option>';

      const data = {
        "1": ["Palma", "Calvià", "Marratxí"],
        "2": ["Maó", "Ciutadella"],
        "3": ["Eivissa", "Sant Antoni"],
        "4": ["Sant Francesc", "Es Pujols"]
      };

      if (!data[illa]) return;
      data[illa].forEach((m) => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        municipi.appendChild(opt);
      });
    }
  </script>
</head>
